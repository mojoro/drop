services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - TTS_SERVER_URL=http://tts:8000
    volumes:
      - ./data:/app/data
    depends_on:
      tts:
        condition: service_healthy

  tts:
    build: ./tts-server
    ports:
      - "8000:8000"
    volumes:
      - ./tts-server/voices:/app/voices
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
